line-length = 120
target-version = "py312"

extend-exclude = [
    ".git",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    ".vs",
    "build",
    "quant_risk_platform.egg-info",
    "reports",
    "temp",
    "var",
]

[lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
]

[lint.isort]
known-first-party = [
    "qrp",
    "quant_risk_platform",
]

[format]
indent-style = "space"
line-ending = "auto"
quote-style = "double"

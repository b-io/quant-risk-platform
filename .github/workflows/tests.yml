name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install formatters
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check source formatting
        run: python scripts/format.py --check

  linux-dev-build:
    name: Linux Dev Build
    needs: quality
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_TARGET_TRIPLET: x64-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            linux-libc-dev \
            ninja-build \
            pkg-config

      - name: Bootstrap vcpkg
        run: |
          VCPKG_BASELINE="$(
            python - <<'PY'
          import json
          from pathlib import Path

          print(json.loads(Path("vcpkg.json").read_text(encoding="utf-8"))["builtin-baseline"])
          PY
          )"
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "$VCPKG_BASELINE"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/archives
            ${{ env.VCPKG_ROOT }}/buildtrees
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-

      - name: Configure dev build (C++ + Python)
        run: |
          mkdir -p build
          set +e
          log_path="$PWD/build/linux-dev-configure.log"
          cmake --preset dev -DQRP_WARNINGS_AS_ERRORS=ON 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python python/github/emit_ci_error_tail.py "$log_path" "Configure dev build failed"
          fi
          exit "$status"

      - name: Build dev artifacts (C++ + Python)
        run: |
          mkdir -p build
          set +e
          log_path="$PWD/build/linux-dev-build.log"
          cmake --build build/dev --config RelWithDebInfo 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python python/github/emit_ci_error_tail.py "$log_path" "Build dev artifacts failed"
          fi
          exit "$status"

      - name: Package dev build
        run: tar -czf build/linux-dev-build.tar.gz -C build dev

      - name: Upload dev build
        uses: actions/upload-artifact@v7
        with:
          name: linux-dev-build
          path: build/linux-dev-build.tar.gz
          retention-days: 1

  linux-dev-test:
    name: Linux Dev Test
    needs: linux-dev-build
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_TARGET_TRIPLET: x64-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore vcpkg artifacts
        uses: actions/cache/restore@v6
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/archives
            ${{ env.VCPKG_ROOT }}/buildtrees
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-

      - name: Download dev build
        uses: actions/download-artifact@v8
        with:
          name: linux-dev-build
          path: artifacts

      - name: Extract dev build
        run: |
          mkdir -p build
          tar -xzf artifacts/linux-dev-build.tar.gz -C build

      - name: Run dev tests (C++ + Python)
        run: |
          mkdir -p build
          set +e
          log_path="$PWD/build/linux-dev-tests.log"
          bash scripts/test.sh -BuildDir build/dev -Config RelWithDebInfo -SkipBuild -SkipCppCoverage -SkipPythonCoverage 2>&1 \
            | tee "$log_path"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python python/github/emit_ci_error_tail.py "$log_path" "Run dev tests failed"
          fi
          exit "$status"

  linux-release-build:
    name: Linux Release Build
    needs: linux-dev-test
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_TARGET_TRIPLET: x64-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            linux-libc-dev \
            ninja-build \
            pkg-config

      - name: Bootstrap vcpkg
        run: |
          VCPKG_BASELINE="$(
            python - <<'PY'
          import json
          from pathlib import Path

          print(json.loads(Path("vcpkg.json").read_text(encoding="utf-8"))["builtin-baseline"])
          PY
          )"
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "$VCPKG_BASELINE"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/archives
            ${{ env.VCPKG_ROOT }}/buildtrees
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-

      - name: Configure release build
        run: |
          mkdir -p build
          set +e
          log_path="$PWD/build/linux-release-configure.log"
          cmake --preset release -DQRP_WARNINGS_AS_ERRORS=ON 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python python/github/emit_ci_error_tail.py "$log_path" "Configure release build failed"
          fi
          exit "$status"

      - name: Build release artifacts
        run: |
          mkdir -p build
          set +e
          log_path="$PWD/build/linux-release-build.log"
          cmake --build build/release --config Release 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python python/github/emit_ci_error_tail.py "$log_path" "Build release artifacts failed"
          fi
          exit "$status"

      - name: Package release build
        run: tar -czf build/linux-release-build.tar.gz -C build release

      - name: Upload release build
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-build
          path: build/linux-release-build.tar.gz
          retention-days: 1

  linux-release-smoke:
    name: Linux Release Smoke
    needs: linux-release-build
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_TARGET_TRIPLET: x64-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore vcpkg artifacts
        uses: actions/cache/restore@v6
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/archives
            ${{ env.VCPKG_ROOT }}/buildtrees
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-

      - name: Download release build
        uses: actions/download-artifact@v8
        with:
          name: linux-release-build
          path: artifacts

      - name: Extract release build
        run: |
          mkdir -p build
          tar -xzf artifacts/linux-release-build.tar.gz -C build

      - name: Run release smoke tests
        run: |
          mkdir -p build
          set +e
          log_path="$PWD/build/linux-release-smoke.log"
          bash scripts/test.sh -BuildDir build/release -Config Release -SkipBuild -SkipCppCoverage -SkipPythonCoverage 2>&1 \
            | tee "$log_path"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python python/github/emit_ci_error_tail.py "$log_path" "Run release smoke tests failed"
          fi
          exit "$status"

  linux-coverage:
    name: Linux Coverage (95% Gate)
    needs: linux-release-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_TARGET_TRIPLET: x64-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            gcovr \
            libtool \
            linux-libc-dev \
            ninja-build \
            pkg-config

      - name: Bootstrap vcpkg
        run: |
          VCPKG_BASELINE="$(
            python - <<'PY'
          import json
          from pathlib import Path

          print(json.loads(Path("vcpkg.json").read_text(encoding="utf-8"))["builtin-baseline"])
          PY
          )"
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "$VCPKG_BASELINE"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/archives
            ${{ env.VCPKG_ROOT }}/buildtrees
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-

      - name: Configure coverage build (C++ instrumentation)
        run: |
          mkdir -p build
          set +e
          log_path="$PWD/build/linux-coverage-configure.log"
          cmake --preset coverage -DQRP_WARNINGS_AS_ERRORS=ON -DQRP_COVERAGE_MIN_LINE=95 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python python/github/emit_ci_error_tail.py "$log_path" "Configure C++ coverage build failed"
          fi
          exit "$status"

      - name: Run C++ coverage (95% line gate)
        run: |
          set +e
          log_path="$PWD/build/linux-cpp-coverage.log"
          cmake --build build/coverage --target coverage 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python python/github/emit_ci_error_tail.py "$log_path" "Run C++ tests and coverage failed"
          fi
          exit "$status"

      - name: Run Python coverage (95% line gate)
        run: |
          python coverage/python/coverage_metric.py \
            --project-root "$PWD" \
            --source "$PWD/python/qrp" \
            --tests "$PWD/tests/python" \
            --json "$PWD/build/coverage/coverage/python/coverage_metric.json" \
            --markdown "$PWD/build/coverage/coverage/python/coverage_metric.md" \
            --threshold 95 \
            --fail-under-threshold

      - name: Update coverage summary and enforce gates
        run: |
          python coverage/coverage_summary.py \
            --cpp-json "$PWD/build/coverage/coverage/cpp/coverage_metric.json" \
            --python-json "$PWD/build/coverage/coverage/python/coverage_metric.json" \
            --output-dir "$PWD/coverage"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            build/coverage/coverage
            coverage

      - name: Commit coverage summary on default branch
        if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage/coverage-badge.svg coverage/coverage_summary.json coverage/coverage_summary.md
          if ! git diff --cached --quiet; then
            git commit -m "Update coverage summary [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

  linux-pipeline-gate:
    name: Linux Pipeline Gate
    needs: linux-coverage
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require Linux pipeline success
        run: |
          if [ "${{ needs.linux-coverage.result }}" != "success" ]; then
            echo "Linux pipeline finished with result: ${{ needs.linux-coverage.result }}"
            exit 1
          fi
          echo "Linux pipeline passed."

  windows-dev-build:
    name: Windows Dev Build
    needs: quality
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_TARGET_TRIPLET: x64-windows-static-md
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ciVcpkgRoot = Join-Path $env:GITHUB_WORKSPACE ".vcpkg"
          $env:VCPKG_ROOT = $ciVcpkgRoot
          "VCPKG_ROOT=$ciVcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using VCPKG_ROOT=$env:VCPKG_ROOT"
          $manifest = Get-Content -Path vcpkg.json -Raw | ConvertFrom-Json
          $baseline = $manifest.'builtin-baseline'
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          git -C "$env:VCPKG_ROOT" checkout --detach "$baseline"
          & (Join-Path $env:VCPKG_ROOT "bootstrap-vcpkg.bat")

      - name: Cache vcpkg artifacts
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.VCPKG_ROOT }}\archives
            ${{ env.VCPKG_ROOT }}\buildtrees
            ${{ env.VCPKG_ROOT }}\downloads
            ${{ env.VCPKG_ROOT }}\installed
            ${{ env.VCPKG_ROOT }}\packages
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-

      - name: Configure dev build (C++ + Python)
        shell: pwsh
        run: cmake --preset dev -DQRP_WARNINGS_AS_ERRORS=ON

      - name: Build dev artifacts (C++ + Python)
        shell: pwsh
        run: cmake --build build\dev --config RelWithDebInfo

      - name: Package dev build
        shell: pwsh
        run: tar -czf build\windows-dev-build.tar.gz -C build dev

      - name: Upload dev build
        uses: actions/upload-artifact@v7
        with:
          name: windows-dev-build
          path: build\windows-dev-build.tar.gz
          retention-days: 1

  windows-dev-test:
    name: Windows Dev Test
    needs: windows-dev-build
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}\.vcpkg
      VCPKG_TARGET_TRIPLET: x64-windows-static-md
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Restore vcpkg artifacts
        uses: actions/cache/restore@v6
        with:
          path: |
            ${{ env.VCPKG_ROOT }}\archives
            ${{ env.VCPKG_ROOT }}\buildtrees
            ${{ env.VCPKG_ROOT }}\downloads
            ${{ env.VCPKG_ROOT }}\installed
            ${{ env.VCPKG_ROOT }}\packages
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-

      - name: Download dev build
        uses: actions/download-artifact@v8
        with:
          name: windows-dev-build
          path: artifacts

      - name: Extract dev build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          tar -xzf artifacts\windows-dev-build.tar.gz -C build

      - name: Run dev tests (C++ + Python)
        shell: pwsh
        run: .\scripts\test.ps1 -BuildDir build\dev -Config RelWithDebInfo -SkipBuild -SkipCppCoverage -SkipPythonCoverage

  windows-pipeline-gate:
    name: Windows Pipeline Gate
    needs: windows-dev-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require Windows pipeline success
        run: |
          if [ "${{ needs.windows-dev-test.result }}" != "success" ]; then
            echo "Windows pipeline finished with result: ${{ needs.windows-dev-test.result }}"
            exit 1
          fi
          echo "Windows pipeline passed."
